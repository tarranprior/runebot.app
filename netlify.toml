[build]
  command = "pnpm build"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/invite"
  to = "https://discord.com/oauth2/authorize?client_id=978953033989914654&permissions=2147764224&scope=bot%20applications.commands"
  status = 302
  force = true

[[redirects]]
# Vanity URL only.
# Do not use this route with next/link or router navigation;
# use direct external anchors in app UI to avoid RSC/CORS redirect fetch issues.
  from = "/support"
  to = "https://discord.com/invite/FWjNkNuTzv"
  status = 302
  force = true
